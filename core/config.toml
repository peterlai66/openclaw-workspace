# OpenClaw 配置

[agents.defaults]
primary = "jcai/llama3-taide-lx-8b-chat-alpha1:q4_K_M"
secondary = "mistral:latest"
tertiary = "qwen2.5:7b-instruct-q4_K_M"
coding = "deepseek-coder:6.7b-instruct-q4_K_M"

# 模型路由配置
[agents.routing]
taiwan_model = "jcai/llama3-taide-lx-8b-chat-alpha1:q4_K_M"
tool_model = "mistral:latest"
coding_model = "deepseek-coder:6.7b-instruct-q4_K_M"
fast_model = "qwen2.5:7b-instruct-q4_K_M"

# 性能優化
[agents.optimization]
gpu_memory_limit = 9000
gpu_layers = 40
num_threads = 6
max_loaded_models = 2